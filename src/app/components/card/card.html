<div class="card-container">
  <div class="card">

    <div class="card-header">
      <h2 class="card-title">{{ title() }}</h2>
    </div>

    <div class="card-media">
      <img [src]="image()" alt="imagen">
    </div>

    <div class="card-body">
      <p class="card-description">{{ description() }}</p>
    </div>

  </div>
</div>

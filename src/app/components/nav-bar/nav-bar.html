<nav class="navbar">

  <ng-container *ngFor="let item of menu">

    <button 
      class="nav-btn"
      *ngIf="(authService.usuarioActual() && item.auth) || (!authService.usuarioActual() && !item.auth)"
      (click)="navegar(item.route)"
    >
      {{ item.label }}
    </button>

  </ng-container>

  @if(this.authService.usuarioActual()){
    <button class="nav-btn" (click)="cerrarSesion()">
      Cerrar Sesión
    </button>
  }

</nav>

<h1>Registro</h1>

<form [formGroup]="formulario" (ngSubmit)="mosrarDatos()">
    <div>
        <label for="nombre">Nombre:</label>
        <input id="nombre" type="text" formControlName="nombre">
    </div>
    <div>
        <label for="apellido">Apellido:</label>
        <input id="apellido" type="text" formControlName="apellido">
    </div>
    <div>
        <label for="mail">Mail:</label>
        <input id="mail" type="email" formControlName="mail">
    </div>
    <div>
        <label for="edad">Edad:</label>
        <input id="edad" type="number" formControlName="edad">
    </div>
    <div>
        <label for="password">Contraseña:</label>
        <input id="password" type="password" formControlName="password">
    </div>
    <button type="submit">Mostrar Datos</button>

</form>

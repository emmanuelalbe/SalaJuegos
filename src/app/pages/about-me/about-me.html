<p>about-me works! Funciona</p>

<div>
  <h2>{{ usuario().name }}</h2>
  <img [src]="usuario().avatar_url" width="150">
  <p>{{ usuario().bio }}</p>
</div>

<app-card
  [title]="usuario()?.name"
  [image]="usuario()?.avatar_url"
  [description]="usuario()?.bio">
</app-card>

<app-card
  *ngIf="usuario() as user"
  [title]="user.name"
  [image]="user.avatar_url"
  [description]="user.bio">
</app-card>
